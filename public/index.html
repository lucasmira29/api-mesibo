<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <title>mesibo teste api</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    crossorigin="anonymous">

  <link rel="stylesheet" href="./css/style.css">
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
    crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" crossorigin="anonymous"></script>

  <!-- mesibo api -->
  <script src="https://cdn.mesibo.com/api/mesibo.js"></script>

  <script src="./js/main.js" defer></script>
</head>

<body>
  <div class="container">
    <div class="border-bottom my-3">
      <h2><span style="color: #00868b;">mesibo</span> - Chamadas de Vídeo API Demo</h2>
    </div>

    <h2 class="mt-5">
      Gerador de Token
    </h2>

    <form id="form">
      <div class="form-group">
        <label>Nome de Usuário</label>
        <input type="text" class="form-control" id="input-user" style="max-width: 300px; width: 100%;">
      </div>
      <div class="form-group">
        <label>App ID</label>
        <input type="text" class="form-control" id="input-appId" style="max-width: 300px; width: 100%;">
        <small>Para fazer ligações, todos devem ter o mesmo app id</small>
      </div>
      <button type="submit" class="btn btn-primary mb-5">Gerar</button>

    </form>

    <div class="form-group">
      <label>Destino da Ligação</label>
      <input type="text" class="form-control" id="input-destination" style="max-width: 300px; width: 100%;">
      <small>Digite o nome do usuário</small>
    </div>

    <h3>Status da Conexão</h3>
    <button type="button" class="btn btn-danger" id="cstatus">Você está offline</button>

    <div style="padding-top: 30px;">
      <button type="button" class="btn btn-primary" onclick="video_call()">Chamar</button>
      <button type="button" class="btn btn-danger" onclick="hangup()">Desligar</button>
      <button type="button" class="btn btn-info" onclick="video_mute_toggle()">Alternar Mudo do Vídeo</button>
      <button type="button" class="btn btn-warning" onclick="audio_mute_toggle()">Alternar Mudo do Áudio</button>
      <button type="button" class="btn btn-info" id="vcstatus" style="float:right;">Status da Chamada:</button>
    </div>

    <div class="container-video">
      <div class="div-remoteVideo">
        <video id="remoteVideo" playsinline autoplay></video>
      </div>
      <div class="div-localVideo">
        <video id="localVideo" playsinline autoplay muted></video>
      </div>
    </div>

    <div class="modal fade" id="answerModal" tabindex="-1" role="dialog" aria-labelledby="answerModalLabel"
      aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="answerModalLabel">Chamada Recebida</h5>
            <button type="button" class="close" data-dismiss="modal" onclick="hangup();" aria-label="Fechar">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body" id="ansBody">
            Chamada recebida de
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-danger" data-dismiss="modal" onclick="hangup();">Desligar</button>
            <button type="button" class="btn btn-success" data-dismiss="modal" onclick="answer();">Atender</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
